name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv pip install --system -e "./flink_cdc_python[dev]"

      - name: Run ruff check
        run: ruff check flink_cdc_python

      - name: Run ruff format check
        run: ruff format --check flink_cdc_python

      - name: Run mypy
        run: mypy flink_cdc_python
